<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testa — Loan Origination Triage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13px;background:#f5f5f5;color:#111827;display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:48px;background:#f5f5f5;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0}
#sidebar img{width:32px;height:32px;object-fit:contain;margin-bottom:8px}
.nav-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6b7280;transition:background .15s,color .15s}
.nav-icon:hover{background:#e5e7eb;color:#374151}
.nav-icon.active{background:#EEF2FF;color:#4F46E5}
.nav-icon svg{width:18px;height:18px}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Views */
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}
/* Pipeline */
#view-pipeline{background:#fff}
.view-header{padding:16px 20px 12px;border-bottom:1px solid #e5e7eb;font-size:14px;font-weight:600;color:#111827}
.pipeline-table{width:100%;border-collapse:collapse;font-size:13px}
.pipeline-table th{text-align:left;padding:8px 16px;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb;background:#f9fafb}
.pipeline-table td{padding:10px 16px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.pipeline-table tr:hover td{background:#f9fafb;cursor:pointer}
.stage-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;background:#EEF2FF;color:#4F46E5}
.issue-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;background:#FEF2F2;color:#dc2626}
.task-link{color:#4F46E5;text-decoration:none;font-weight:500}
.loan-id{font-family:'Courier New',monospace;font-size:12px;color:#4F46E5}
/* Triage Queue */
#view-triage{flex-direction:row}
#triage-list{width:320px;flex-shrink:0;border-right:1px solid #e5e7eb;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.triage-header{padding:14px 16px 10px;border-bottom:1px solid #e5e7eb;font-size:13px;font-weight:600;color:#111827;flex-shrink:0}
.issue-item{padding:12px 16px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .12s}
.issue-item:hover{background:#f9fafb}
.issue-item.active{background:#EEF2FF;border-left:2px solid #4F46E5}
.issue-item-title{font-weight:500;color:#111827;margin-bottom:3px;font-size:12.5px;line-height:1.4}
.issue-item-meta{font-size:11px;color:#6b7280;display:flex;gap:8px;align-items:center;margin-bottom:4px}
.issue-item-loan{font-size:11px;color:#4F46E5;font-family:'Courier New',monospace}
.type-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em}
.sev-high{background:#FEF2F2;color:#dc2626}
.sev-med{background:#FFFBEB;color:#d97706}
.sev-low{background:#F0FDF4;color:#16a34a}
.type-agent{background:#EEF2FF;color:#4F46E5}
.type-rule{background:#FDF4FF;color:#9333ea}
.type-cond{background:#FFFBEB;color:#d97706}
.type-doc{background:#FFF7ED;color:#ea580c}
.type-miss{background:#F0FDF4;color:#16a34a}
.type-int{background:#FEF2F2;color:#dc2626}
/* Investigation Panel */
#investigation-panel{flex:1;overflow-y:auto;background:#fff;display:flex;flex-direction:column}
.inv-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:13px}
.inv-content{padding:20px 24px;max-width:860px}
.inv-issue-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e5e7eb}
.inv-issue-title{font-size:15px;font-weight:600;color:#111827;margin-bottom:8px}
.inv-badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.inv-loan-stats{font-size:12px;color:#6b7280;font-family:'Courier New',monospace}
.section-label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:16px}
.data-block{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:12px 14px;margin-bottom:10px}
.data-block-title{font-size:11px;font-weight:600;color:#4F46E5;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.data-row{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.data-row:last-child{border-bottom:none}
.data-key{color:#6b7280;min-width:160px;flex-shrink:0}
.data-val{color:#111827;font-family:'Courier New',monospace;font-size:11.5px}
.warn-text{color:#d97706;font-size:12px;margin-top:4px}
.error-text{color:#dc2626;font-size:12px;margin-top:4px}
.cot-list{list-style:none;padding:0}
.cot-list li{padding:3px 0 3px 12px;border-left:2px solid #e5e7eb;margin-bottom:4px;font-size:12px;color:#374151;position:relative}
.cot-list li::before{content:'→';position:absolute;left:-10px;color:#9ca3af;font-size:10px;top:4px}
textarea.diagnosis{width:100%;border:1px solid #d1d5db;border-radius:6px;padding:10px 12px;font-size:12.5px;font-family:'Inter',sans-serif;resize:vertical;min-height:80px;color:#111827;outline:none;transition:border .15s}
textarea.diagnosis:focus{border-color:#4F46E5}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:'Inter',sans-serif}
.btn-primary{background:#4F46E5;color:#fff;border-color:#4F46E5}
.btn-primary:hover{background:#4338CA}
.btn-secondary{background:#fff;color:#374151;border-color:#d1d5db}
.btn-secondary:hover{background:#f9fafb}
.btn-danger{background:#fff;color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#FEF2F2}
.btn-warning{background:#fff;color:#d97706;border-color:#fcd34d}
.btn-warning:hover{background:#FFFBEB}
.resolution-section{margin-top:16px;padding-top:16px;border-top:1px solid #e5e7eb}
.resolution-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:10px}
.inline-confirm{padding:8px 12px;background:#F0FDF4;border:1px solid #bbf7d0;border-radius:6px;font-size:12px;color:#16a34a;margin-top:10px}
/* Escalation modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:14px;font-weight:600}
.modal-close{cursor:pointer;color:#6b7280;font-size:18px;line-height:1;background:none;border:none}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:12.5px;font-family:'Inter',sans-serif;color:#111827;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#4F46E5}
.form-textarea{resize:vertical;min-height:70px}
.modal-footer{padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px}
/* Loan File */
#view-loan{background:#fff;overflow:hidden}
.loan-header{padding:8px 20px;background:#fff;border-bottom:1px solid #e5e7eb;font-size:12px;color:#374151;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.loan-header .loan-id-h{font-family:'Courier New',monospace;font-size:12px;font-weight:700;color:#4F46E5}
.loan-header .sep{color:#d1d5db}
.metric-item{display:inline-flex;align-items:center;gap:3px}
.metric-label{color:#9ca3af;font-size:11px}
.metric-val{font-weight:600;font-size:12px;font-family:'Courier New',monospace}
.metric-val.indigo{color:#4F46E5}
.metric-val.red{color:#dc2626}
.back-btn{color:#4F46E5;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;padding:4px 0}
/* Tabs */
.tabs-bar{display:flex;border-bottom:1px solid #e5e7eb;padding:0 20px;background:#fff;flex-shrink:0;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:#374151}
.tab.active{color:#4F46E5;border-bottom-color:#4F46E5}
.tab-content{display:none;flex:1;overflow-y:auto;padding:20px}
.tab-content.active{display:block}
/* Cards */
.cards-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;flex:1;min-width:140px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-label{font-size:11px;color:#9ca3af;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.card-val{font-size:18px;font-weight:600;color:#111827}
.card-val.indigo{color:#4F46E5}
.card-sub{font-size:11px;color:#6b7280;margin-top:2px}
/* Tables in tabs */
.data-table{width:100%;border-collapse:collapse;font-size:12.5px}
.data-table th{text-align:left;padding:7px 12px;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb;background:#f9fafb}
.data-table td{padding:9px 12px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.data-table tr:hover td{background:#f9fafb}
.status-satisfied{color:#16a34a;font-weight:500}
.status-pending{color:#d97706;font-weight:500}
.status-open{color:#dc2626;font-weight:500}
.status-processing{color:#d97706;font-weight:500}
.status-classified{color:#16a34a;font-weight:500}
.flag-amber{color:#d97706;font-size:11px;margin-top:2px}
.flag-red{color:#dc2626;font-size:11px;margin-top:2px}
.flag-green{color:#16a34a;font-size:11px}
/* Agent tasks */
.agent-task{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.agent-task-header{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fff;transition:background .12s}
.agent-task-header:hover{background:#f9fafb}
.task-name{font-weight:500;color:#111827;flex:1;font-size:13px}
.task-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.ts-completed{background:#F0FDF4;color:#16a34a}
.ts-failed{background:#FEF2F2;color:#dc2626}
.ts-errors{background:#FFFBEB;color:#d97706}
.ts-stuck{background:#FFF7ED;color:#ea580c}
.ts-nottriggered{background:#F3F4F6;color:#6b7280}
.task-ts{font-family:'Courier New',monospace;font-size:11px;color:#9ca3af}
.agent-task-body{padding:12px 16px;border-top:1px solid #f3f4f6;background:#f9fafb;display:none}
.agent-task-body.open{display:block}
.cot-section{margin-bottom:10px}
.cot-title{font-size:11px;font-weight:600;color:#4F46E5;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.output-box{background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:8px 10px;font-size:12px;color:#374151}
.warn-box{background:#FFFBEB;border:1px solid #fde68a;border-radius:4px;padding:8px 10px;font-size:12px;color:#92400e;margin-top:6px}
.error-box{background:#FEF2F2;border:1px solid #fca5a5;border-radius:4px;padding:8px 10px;font-size:12px;color:#991b1b;margin-top:6px}
/* Audit trail */
.audit-entry{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6}
.audit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dot-system{background:#9ca3af}
.dot-agent{background:#4F46E5}
.dot-rules_engine{background:#9333ea}
.dot-loan_officer{background:#3b82f6}
.dot-borrower{background:#16a34a}
.dot-analyst{background:#f59e0b}
.audit-ts{font-family:'Courier New',monospace;font-size:11px;color:#9ca3af;min-width:175px;flex-shrink:0}
.audit-event{font-size:12.5px;color:#374151;flex:1}
.audit-actor{font-size:11px;color:#9ca3af;min-width:80px;text-align:right}
/* JSON tab */
#json-view{background:#1e1e2e;border-radius:8px;padding:16px;font-family:'Courier New',monospace;font-size:12px;line-height:1.7;overflow-x:auto;white-space:pre;color:#cdd6f4}
.jk{color:#89b4fa} /* keys */
.jv-s{color:#a6e3a1} /* string */
.jv-n{color:#fab387} /* number */
.jv-b{color:#cba6f7} /* bool */
.jv-null{color:#f38ba8} /* null */
/* Two col layout for loan overview */
.two-col{display:flex;gap:16px}
.col-main{flex:1}
.col-side{width:240px;flex-shrink:0}
.tasks-list-mini .tl-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12.5px}
.tl-item-name{color:#4F46E5;font-weight:500;cursor:pointer}
.tl-item-meta{font-size:11px;color:#9ca3af;margin-top:1px}
.tl-assign{font-size:11px;color:#4F46E5;cursor:pointer}
.key-dates-panel{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px}
.kd-title{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.kd-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.kd-row:last-child{border-bottom:none}
.kd-label{color:#6b7280}
.kd-val{font-weight:500;color:#111827;font-family:'Courier New',monospace;font-size:11px}
.link-status{display:flex;align-items:center;gap:6px;font-size:12px}
.check-green::before{content:'✓';color:#16a34a;font-weight:700}
.warn-amber::before{content:'⚠';color:#d97706}
.editable-field-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.edit-input{border:1px solid #d1d5db;border-radius:4px;padding:5px 8px;font-size:12.5px;font-family:'Courier New',monospace;width:120px}
.section-title{font-size:13px;font-weight:600;color:#111827;margin-bottom:12px}
.table-wrapper{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.highlight-row td{background:#FFFBEB}
.cond-doc-note{font-size:11px;color:#d97706;margin-top:2px}
</style>
</head>

<!-- Main -->
<div id="main">

  <!-- VIEW: Pipeline -->

    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">

      <div class="tab-content" id="tab-liabilities"></div>
      <div class="tab-content" id="tab-income"></div>
      <div class="tab-content" id="tab-assets"></div>
      <div class="tab-content" id="tab-conditions"></div>
      <div class="tab-content" id="tab-documents"></div>
      <div class="tab-content" id="tab-agent-tasks"></div>
      <div class="tab-content" id="tab-audit-trail"></div>
      <div class="tab-content" id="tab-loan-json"></div>
    </div>
  </div>

</div>

<!-- Escalation Modal -->
<div class="modal-overlay" id="esc-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Escalate to Engineering</span>
      <button class="modal-close" onclick="closeEscModal()">×</button>
    </div>
    <div class="modal-body" id="esc-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEscModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEscalation()">Submit Escalation</button>
    </div>
  </div>
</div>

function nowTs() {
  return new Date().toISOString().replace('T',' ').substring(0,19) + 'Z';
}
function nowIso() { return new Date().toISOString(); }

function addAuditEntry(event, actor, actorId) {
  state.evtCounter++;
  state.auditTrail.unshift({
    id: 'EVT-'+String(state.evtCounter).padStart(3,'0'),
    timestamp: nowIso(),
    event, actor, actorId
  });
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function showView(v) {
  state.currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='pipeline') renderPipeline();
  if(v==='triage') renderTriage();
  if(v==='loan') renderLoan();
}

function showTab(t) {
  state.currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  const tabs = document.querySelectorAll('.tab');
  const tabMap = ['overview','liabilities','income','assets','conditions','documents','agent-tasks','audit-trail','loan-json'];
  const idx = tabMap.indexOf(t);
  if(tabs[idx]) tabs[idx].classList.add('active');
  const el = document.getElementById('tab-'+t);
  if(el) el.classList.add('active');
  renderTab(t);
}

function openLoan(loanId) {
  state.currentLoanId = loanId;
  showView('loan');
}

// ─── PIPELINE ───────────────────────────────────────────────────────────────

function renderPipeline() {
  const tbody = document.getElementById('pipeline-tbody');
  tbody.innerHTML = loans.map(l => `
    <tr onclick="openLoan('${l.id}')">
      <td><span class="loan-id">${l.id}</span></td>
      <td>${l.borrower}</td>
      <td><span class="stage-pill">${l.stage}</span></td>
      <td>${l.amount}</td>
      <td style="font-family:'Courier New',monospace;font-size:12px">${l.closing}</td>
      <td><a class="task-link">${l.tasks} tasks</a></td>
      <td>${l.issues > 0 ? `<span class="issue-badge">${l.issues}</span>` : '<span style="color:#9ca3af;font-size:12px">—</span>'}</td>
    </tr>
  `).join('');
}

// ─── TRIAGE ─────────────────────────────────────────────────────────────────

function renderTriage() {
  const open = issues.filter(i => (state.issueStatuses[i.id]||i.status) !== 'resolved');
  document.getElementById('triage-count').textContent = open.length + ' active';
  document.getElementById('triage-items').innerHTML = issues.map(iss => {
    const st = state.issueStatuses[iss.id] || iss.status;
    const isActive = state.selectedIssueId === iss.id;
    return `<div class="issue-item${isActive?' active':''}" onclick="selectIssue('${iss.id}')">
      <div class="issue-item-title">${iss.title}</div>
      <div class="issue-item-meta">
        <span class="type-badge ${iss.typeCls}">${iss.type}</span>
        <span class="type-badge ${iss.sevCls}">${iss.severity}</span>
        ${st!=='open'?`<span class="type-badge" style="background:#F3F4F6;color:#6b7280">${st.toUpperCase()}</span>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="issue-item-loan">${iss.loanId} · ${iss.borrower}</span>
        <span style="font-size:11px;color:#9ca3af">${iss.openSince}</span>
      </div>
    </div>`;
  }).join('');

  if(state.selectedIssueId) renderInvestigation(state.selectedIssueId);
}

function selectIssue(id) {
  state.selectedIssueId = id;
  if(state.issueStatuses[id] === 'open' || !state.issueStatuses[id]) {
    state.issueStatuses[id] = 'investigating';
  }
  renderTriage();
}

function toggleTask(id) {

function syntaxHighlight(json) {
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
      let cls = 'jv-n';
      if (/^"/.test(match)) {
        if (/:$/.test(match)) { cls = 'jk'; } else { cls = 'jv-s'; }
      } else if (/true|false/.test(match)) { cls = 'jv-b'; }
      else if (/null/.test(match)) { cls = 'jv-null'; }
      return `<span class="${cls}">${match}</span>`;
    });
}
